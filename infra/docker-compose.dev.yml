services:
  webapp-backend:
    volumes:
      - ../apps/webapp-backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  webapp-frontend:
    volumes:
      - ../apps/webapp-frontend:/app
      - webapp-frontend-node-modules:/app/node_modules
    command: npm run dev
    environment:
      NODE_ENV: development

  file-server:
    volumes:
      - ../apps/file-server:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload
    ports:
      - "8002:8002"
    environment:
      APP_ENV: development
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      MINIO_PUBLIC_SECURE: "false"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"

volumes:
  webapp-frontend-node-modules:
